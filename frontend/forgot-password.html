<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password | Glow Beauty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-section{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .auth-box{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .auth-box h2{text-align:center;margin-bottom:8px;color:#c86b85}
    .auth-box p.sub{text-align:center;color:#777;margin-bottom:24px;font-size:.93rem}
    .auth-form{display:flex;flex-direction:column;gap:16px}
    .auth-form input{padding:12px 16px;border:1.5px solid #e2dcda;border-radius:8px;font-size:.95rem;outline:none;transition:border .2s;width:100%}
    .auth-form input:focus{border-color:#c86b85}
    .auth-form .btn{width:100%;text-align:center;padding:13px;font-size:1rem;border:none;cursor:pointer}
    .err-msg{color:#e55;font-size:.88rem;text-align:center}
    .ok-msg{color:#4a9;font-size:.88rem;text-align:center}
    .back-link{text-align:center;margin-top:12px;font-size:.9rem}
    .back-link a{color:#c86b85;text-decoration:none}
  </style>
</head>
<body>
<header class="navbar">
  <div class="container nav-flex">
    <h1 class="logo">Glow Reeba Beauty</h1>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="login.html">Login</a>
    </nav>
  </div>
</header>

<section class="auth-section">
  <div class="auth-box">
    <h2>Forgot Password?</h2>
    <p class="sub">Enter your email and we'll send you a reset link.</p>
    <div class="auth-form">
      <p class="err-msg" id="err"></p>
      <p class="ok-msg"  id="ok"></p>
      <input type="email" id="email" placeholder="Email address" required>
      <button class="btn" onclick="doForgot()">Send Reset Link</button>
    </div>
    <p class="back-link"><a href="login.html">← Back to Login</a></p>
  </div>
</section>

<footer class="footer">
  <p class="copyright">© 2026 Glow Reeba Beauty. Academic Project.</p>
</footer>

<script src="api.js"></script>
<script>
  async function doForgot() {
    const email = document.getElementById('email').value.trim();
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.textContent = '';
    if (!email) return err.textContent = 'Please enter your email.';
    try {
      await AuthAPI.forgotPassword(email);
      ok.textContent = 'If your email is registered, a reset link has been sent.';
    } catch (e) {
      err.textContent = e.message;
    }
  }
</script>
</body>
</html>
