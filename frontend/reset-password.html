<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password | Glow Beauty</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .auth-section{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .auth-box{background:#fff;border-radius:16px;padding:40px;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08)}
    .auth-box h2{text-align:center;margin-bottom:20px;color:#c86b85}
    .auth-form{display:flex;flex-direction:column;gap:16px}
    .auth-form input{padding:12px 16px;border:1.5px solid #e2dcda;border-radius:8px;font-size:.95rem;outline:none;transition:border .2s;width:100%}
    .auth-form input:focus{border-color:#c86b85}
    .auth-form .btn{width:100%;text-align:center;padding:13px;font-size:1rem;border:none;cursor:pointer}
    .err-msg{color:#e55;font-size:.88rem;text-align:center}
    .ok-msg{color:#4a9;font-size:.88rem;text-align:center}
  </style>
</head>
<body>
<header class="navbar">
  <div class="container nav-flex">
    <h1 class="logo">Glow Untul Mubeen Beauty</h1>
    <nav class="nav-links"><a href="login.html">Login</a></nav>
  </div>
</header>

<section class="auth-section">
  <div class="auth-box">
    <h2>Set New Password</h2>
    <div class="auth-form">
      <p class="err-msg" id="err"></p>
      <p class="ok-msg"  id="ok"></p>
      <input type="password" id="password"  placeholder="New password (min 6 chars)" required>
      <input type="password" id="password2" placeholder="Confirm password" required>
      <button class="btn" onclick="doReset()">Reset Password</button>
    </div>
  </div>
</section>

<script src="api.js"></script>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) { document.getElementById('err').textContent = 'Invalid reset link.'; }

  async function doReset() {
    const p1  = document.getElementById('password').value;
    const p2  = document.getElementById('password2').value;
    const err = document.getElementById('err');
    const ok  = document.getElementById('ok');
    err.textContent = ''; ok.textContent = '';
    if (p1.length < 6) return err.textContent = 'Password must be at least 6 characters.';
    if (p1 !== p2)    return err.textContent = 'Passwords do not match.';
    try {
      await AuthAPI.resetPassword(token, p1);
      ok.textContent = 'Password reset! Redirecting…';
      setTimeout(() => window.location.href = 'index.html', 1500);
    } catch (e) {
      err.textContent = e.message;
    }
  }
</script>
</body>
</html>
